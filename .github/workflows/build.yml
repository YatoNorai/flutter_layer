name: build

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter version tag (e.g. 3.29.2, 3.22.0, 3.10.0, 2.10.5) — leave blank for default'
        required: false
        default: ''
      arch:
        description: 'Target CPU architecture'
        required: false
        default: 'arm64'
        type: choice
        options: [arm64, arm, x64, x86]
      mode:
        description: 'Build mode'
        required: false
        default: 'release'
        type: choice
        options: [release, debug, profile]
      ndk_version:
        description: 'Android NDK version (e.g. r27c, r26d, r25c)'
        required: false
        default: 'r27c'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ── Checkout ─────────────────────────────────────────────────────────────
    - name: Checkout
      uses: actions/checkout@v4

    # ── System dependencies ───────────────────────────────────────────────────
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libfreetype-dev ninja-build curl unzip git \
          pkg-config build-essential python3-pip python3-venv

    # ── depot_tools (must come before pip so we know PATH order) ─────────────
    - name: Set up depot_tools
      uses: newkdev/setup-depot-tools@v1.0.1

    # ── Python deps — always use /usr/bin/python3 to bypass depot_tools vpython
    - name: Install Python requirements
      run: |
        /usr/bin/python3 -m pip install --upgrade pip
        /usr/bin/python3 -m pip install -r requirements.txt

    # ── NDK ───────────────────────────────────────────────────────────────────
    - name: Set up Android NDK
      run: |
        NDK_VER="${{ inputs.ndk_version || 'r27c' }}"
        NDK_URL="https://dl.google.com/android/repository/android-ndk-${NDK_VER}-linux.zip"
        echo "Downloading NDK ${NDK_VER}..."
        curl -fsSL "${NDK_URL}" -o ndk.zip
        unzip -q ndk.zip -d "$HOME"
        NDK_PATH=$(find "$HOME" -maxdepth 1 -name "android-ndk-*" -type d | head -1)
        echo "ANDROID_NDK=${NDK_PATH}" >> "$GITHUB_ENV"
        echo "NDK installed at: ${NDK_PATH}"

    # ── Resolve Flutter version ───────────────────────────────────────────────
    - name: Resolve Flutter version
      id: version
      run: |
        INPUT_VER="${{ inputs.flutter_version }}"
        if [ -z "$INPUT_VER" ]; then
          INPUT_VER=$(/usr/bin/python3 -c "
        import tomllib
        with open('build.toml','rb') as f:
            c = tomllib.load(f)
        print(c['flutter']['tag'])
        ")
        fi
        INPUT_VER="${INPUT_VER#v}"
        echo "flutter_version=${INPUT_VER}" >> "$GITHUB_OUTPUT"
        echo "Resolved Flutter version: ${INPUT_VER}"

    # ── Build ─────────────────────────────────────────────────────────────────
    - name: Build Flutter ${{ steps.version.outputs.flutter_version }}
      env:
        ANDROID_NDK: ${{ env.ANDROID_NDK }}
        FLUTTER_VERSION: ${{ steps.version.outputs.flutter_version }}
        FLUTTER_ARCH: ${{ inputs.arch || 'arm64' }}
        FLUTTER_MODE: ${{ inputs.mode || 'release' }}
      run: /usr/bin/python3 build.py

    # ── Parse output tag ──────────────────────────────────────────────────────
    - name: Parse output tag
      id: parser
      run: |
        VER="${{ steps.version.outputs.flutter_version }}"
        ARCH="${{ inputs.arch || 'arm64' }}"
        echo "TAG=v${VER}-${ARCH}" >> "$GITHUB_OUTPUT"
        echo "TITLE=Flutter ${VER} (${ARCH})" >> "$GITHUB_OUTPUT"

    # ── Upload artifact ───────────────────────────────────────────────────────
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: flutter-${{ steps.version.outputs.flutter_version }}-${{ inputs.arch || 'arm64' }}
        path: '**/*.deb'
        compression-level: 9
        if-no-files-found: warn

    # ── GitHub Release ────────────────────────────────────────────────────────
    - name: Create GitHub Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.parser.outputs.TAG }}
        name: ${{ steps.parser.outputs.TITLE }}
        files: '**/*.deb'
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
