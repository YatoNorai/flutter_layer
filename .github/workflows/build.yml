name: build

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter version tag (e.g. 3.29.2, 3.22.0, 3.10.0, 2.10.5)'
        required: false
        default: ''
      arch:
        description: 'Target CPU architecture'
        required: false
        default: 'arm64'
        type: choice
        options:
          - arm64
          - arm
          - x64
          - x86
      mode:
        description: 'Build mode'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug
          - profile
      ndk_version:
        description: 'Android NDK version (e.g. r27c, r26d, r25c)'
        required: false
        default: 'r27c'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ── NDK ──────────────────────────────────────────────────────────────────
    - name: Set up Android NDK ${{ inputs.ndk_version || 'r27c' }}
      id: ndk
      run: |
        NDK_VER="${{ inputs.ndk_version || 'r27c' }}"
        NDK_URL="https://dl.google.com/android/repository/android-ndk-${NDK_VER}-linux.zip"
        echo "Downloading NDK ${NDK_VER}..."
        curl -fsSL "${NDK_URL}" -o ndk.zip
        unzip -q ndk.zip -d $HOME
        NDK_PATH=$(find $HOME -maxdepth 1 -name "android-ndk-*" -type d | head -1)
        echo "ANDROID_NDK=${NDK_PATH}" >> $GITHUB_ENV
        echo "ndk_path=${NDK_PATH}" >> $GITHUB_OUTPUT

    # ── System dependencies ──────────────────────────────────────────────────
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libfreetype-dev ninja-build curl unzip git \
          python3-pip pkg-config build-essential

    # ── depot_tools ─────────────────────────────────────────────────────────
    - name: Set up depot_tools
      uses: newkdev/setup-depot-tools@v1.0.1

    # ── Python deps ─────────────────────────────────────────────────────────
    - name: Install Python requirements
      run: pip install -r requirements.txt

    # ── Resolve Flutter version ──────────────────────────────────────────────
    - name: Resolve Flutter version
      id: version
      run: |
        INPUT_VER="${{ inputs.flutter_version }}"
        if [ -z "$INPUT_VER" ]; then
          # Read default from build.toml
          INPUT_VER=$(python3 -c "
        import tomllib
        with open('build.toml','rb') as f:
            c=tomllib.load(f)
        print(c['flutter']['tag'])
        ")
        fi
        echo "flutter_version=${INPUT_VER}" >> $GITHUB_OUTPUT
        echo "Resolved Flutter version: ${INPUT_VER}"

    # ── Compatibility matrix for old Flutter versions ───────────────────────
    - name: Detect compatibility flags
      id: compat
      run: |
        VER="${{ steps.version.outputs.flutter_version }}"
        python3 - <<'EOF'
        import sys, os, re

        ver_str = "$VER".lstrip('v')
        parts = re.split(r'[.\-]', ver_str)
        try:
            major, minor, patch = int(parts[0]), int(parts[1]), int(parts[2])
        except (ValueError, IndexError):
            major, minor, patch = 3, 0, 0

        flags = []

        # Flutter < 3.0: use old GN script path
        if major < 3:
            flags.append('LEGACY_GN=1')

        # Flutter < 3.3: --no-build-embedder-examples not available
        if (major, minor) < (3, 3):
            flags.append('NO_EMBEDDER_EXAMPLES=0')
        else:
            flags.append('NO_EMBEDDER_EXAMPLES=1')

        # Flutter < 3.7: dart_include_wasm_opt not available
        if (major, minor) < (3, 7):
            flags.append('HAS_WASM_OPT=0')
        else:
            flags.append('HAS_WASM_OPT=1')

        # Flutter < 3.10: no perfetto flags
        if (major, minor) < (3, 10):
            flags.append('HAS_PERFETTO=0')
        else:
            flags.append('HAS_PERFETTO=1')

        env_file = os.environ.get('GITHUB_OUTPUT', '/dev/stdout')
        with open(env_file, 'a') as f:
            for flag in flags:
                k, v = flag.split('=', 1)
                f.write(f"{k.lower()}={v}\n")
        EOF

    # ── Build ────────────────────────────────────────────────────────────────
    - name: Build Flutter ${{ steps.version.outputs.flutter_version }}
      env:
        ANDROID_NDK: ${{ env.ANDROID_NDK }}
      run: |
        VER="${{ steps.version.outputs.flutter_version }}"
        ARCH="${{ inputs.arch || 'arm64' }}"
        MODE="${{ inputs.mode || 'release' }}"

        python3 build.py \
          --flutter_version="${VER}" \
          --arch="${ARCH}" \
          --mode="${MODE}"

    # ── Parse output tag ─────────────────────────────────────────────────────
    - name: Parse output tag
      id: parser
      run: |
        TAG="${{ steps.version.outputs.flutter_version }}"
        ARCH="${{ inputs.arch || 'arm64' }}"
        echo "TAG=v${TAG}-${ARCH}" >> $GITHUB_OUTPUT
        echo "TITLE=Flutter ${TAG} (${ARCH})" >> $GITHUB_OUTPUT

    # ── Upload artifact ──────────────────────────────────────────────────────
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: flutter-${{ steps.version.outputs.flutter_version }}-${{ inputs.arch || 'arm64' }}
        path: '**/*.deb'
        compression-level: 9
        if-no-files-found: warn

    # ── Release ──────────────────────────────────────────────────────────────
    - name: Create GitHub Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.parser.outputs.TAG }}
        name: ${{ steps.parser.outputs.TITLE }}
        files: '**/*.deb'
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
